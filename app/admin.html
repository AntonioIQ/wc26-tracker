<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Resultados · WC 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #ffffff;
      --bg-soft:      #fafafa;
      --bg-input:     #f4f4f5;
      --border:       #e4e4e7;
      --border-2:     #d4d4d8;
      --text:         #09090b;
      --text-2:       #3f3f46;
      --text-soft:    #71717a;
      --text-muted:   #a1a1aa;
      --ink:          #18181b;
      --accent:       #16a34a;
      --accent-soft:  #ecfdf5;
      --accent-border:#86efac;
      --warn:         #ea580c;
      --danger:       #dc2626;
      --danger-soft:  #fef2f2;
      --live:         #e11d48;
      --shadow-sm:    0 1px 2px 0 rgba(0,0,0,.04);
      --shadow-md:    0 4px 12px -2px rgba(0,0,0,.06), 0 2px 4px -1px rgba(0,0,0,.04);
      --shadow-lg:    0 20px 40px -10px rgba(0,0,0,.12), 0 8px 16px -8px rgba(0,0,0,.06);
      --radius:       10px;
      --radius-sm:    7px;
      --radius-lg:    14px;
      --sans:         "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --mono:         "JetBrains Mono", "SF Mono", ui-monospace, monospace;
    }

    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
      letter-spacing: -0.005em;
    }

    /* ── HEADER ── */
    .hdr {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255,255,255,.85);
      backdrop-filter: saturate(180%) blur(14px);
      -webkit-backdrop-filter: saturate(180%) blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .hdr-left { display: flex; align-items: center; gap: 12px; }
    .hdr-logo {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: var(--ink);
      display: flex; align-items: center; justify-content: center;
      color: #fff;
    }
    .hdr-text { display: flex; flex-direction: column; line-height: 1.15; }
    .hdr-title {
      font-size: 13px; font-weight: 700; color: var(--text);
      letter-spacing: -0.01em;
    }
    .hdr-sub {
      font-size: 11px; color: var(--text-muted); font-weight: 500;
      font-family: var(--mono); letter-spacing: 0;
    }
    .hdr-right {
      font-size: 11px; color: var(--text-muted); font-weight: 500;
      font-family: var(--mono); letter-spacing: 0;
    }

    /* ── AUTH GATE ── */
    #gate {
      display: flex; align-items: center; justify-content: center;
      min-height: calc(100vh - 60px);
      padding: 32px 20px;
    }
    .gate-card {
      width: 100%; max-width: 380px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow-md);
    }
    .gate-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--bg-input);
      display: flex; align-items: center; justify-content: center;
      color: var(--text); margin-bottom: 18px;
    }
    .gate-card h2 {
      font-size: 18px; font-weight: 700; letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    .gate-card p {
      font-size: 13px; color: var(--text-soft); margin-bottom: 22px;
      line-height: 1.5;
    }
    .gate-label {
      display: block; font-size: 11.5px; font-weight: 600;
      color: var(--text-2); margin-bottom: 7px; letter-spacing: -0.005em;
    }
    .gate-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border-2);
      color: var(--text);
      border-radius: var(--radius);
      padding: 11px 13px;
      font-size: 13.5px;
      font-family: var(--sans);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .gate-input:focus {
      border-color: var(--ink);
      box-shadow: 0 0 0 3px rgba(24,24,27,.08);
    }
    .btn-primary {
      width: 100%; margin-top: 14px;
      background: var(--ink); color: #fff; border: none;
      border-radius: var(--radius);
      padding: 11px 18px;
      font-size: 13.5px; font-weight: 600;
      font-family: var(--sans);
      cursor: pointer;
      transition: opacity .15s, transform .05s;
      letter-spacing: -0.005em;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:active { transform: scale(.99); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .gate-err {
      font-size: 12px; color: var(--danger); margin-top: 12px;
      min-height: 16px; font-weight: 500;
    }

    /* ── APP ── */
    #app { display: none; }

    .ctrl {
      padding: 14px 24px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 57px; z-index: 40;
      background: rgba(255,255,255,.92);
      backdrop-filter: saturate(180%) blur(10px);
      -webkit-backdrop-filter: saturate(180%) blur(10px);
    }
    .chips { display: flex; gap: 4px; flex: 1; flex-wrap: wrap; }
    .chip {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-soft);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12.5px; font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      font-family: var(--sans);
      letter-spacing: -0.005em;
    }
    .chip:hover { background: var(--bg-input); color: var(--text); }
    .chip.on {
      background: var(--ink); color: #fff; font-weight: 600;
    }
    .chip .ct {
      display: inline-block; margin-left: 5px;
      font-size: 11px; opacity: .7; font-family: var(--mono);
    }
    .btn-save {
      background: var(--ink); color: #fff; border: none;
      border-radius: var(--radius); padding: 8px 16px;
      font-size: 12.5px; font-weight: 600;
      font-family: var(--sans); cursor: pointer;
      transition: opacity .15s, transform .05s;
      display: flex; align-items: center; gap: 8px; white-space: nowrap;
      letter-spacing: -0.005em;
    }
    .btn-save:hover { opacity: .88; }
    .btn-save:active { transform: scale(.99); }
    .btn-save:disabled { opacity: .35; cursor: not-allowed; }
    .n-badge {
      background: rgba(255,255,255,.18);
      color: #fff;
      border-radius: 5px; padding: 1px 7px;
      font-size: 11px; font-weight: 700;
      font-family: var(--mono);
      min-width: 20px; text-align: center;
    }

    /* ── STATUS BAR ── */
    .sbar {
      padding: 9px 24px;
      font-size: 12px; font-family: var(--mono);
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      min-height: 36px;
      display: flex; align-items: center; gap: 8px;
      transition: color .2s, background .2s;
    }
    .sbar::before {
      content: ""; width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-muted);
    }
    .sbar.ok    { color: var(--accent); background: var(--accent-soft); }
    .sbar.ok::before    { background: var(--accent); }
    .sbar.err   { color: var(--danger); background: var(--danger-soft); }
    .sbar.err::before   { background: var(--danger); }
    .sbar.busy  { color: var(--warn); }
    .sbar.busy::before  { background: var(--warn); animation: pulse 1.4s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .4; transform: scale(.85); }
    }

    /* ── MATCH LIST ── */
    .mlist {
      padding: 8px 20px 100px;
      max-width: 900px; margin: 0 auto;
    }

    .day-hdr {
      padding: 22px 4px 10px;
      font-size: 11px; font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: flex; align-items: center; gap: 12px;
    }
    .day-hdr::after {
      content: ""; flex: 1; height: 1px; background: var(--border);
    }
    .day-hdr .day-ct {
      font-family: var(--mono); font-weight: 500;
      color: var(--text-muted); letter-spacing: 0;
    }

    .mrow {
      display: grid;
      grid-template-columns: 78px 1fr auto 1fr 118px;
      align-items: center; gap: 10px;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 6px;
      background: var(--bg);
      transition: all .15s;
      position: relative;
    }
    .mrow:hover { border-color: var(--border-2); box-shadow: var(--shadow-sm); }
    .mrow.dirty {
      border-color: var(--ink);
      background: var(--bg);
      box-shadow: 0 0 0 1px var(--ink), var(--shadow-sm);
    }
    .mrow.dirty::before {
      content: ""; position: absolute;
      left: -1px; top: 8px; bottom: 8px;
      width: 3px; background: var(--ink); border-radius: 2px;
    }
    .mrow.finished { background: var(--bg-soft); }

    .mtime {
      font-family: var(--mono); font-size: 10.5px;
      color: var(--text-muted); line-height: 1.45;
      white-space: nowrap;
    }
    .mtime .stg {
      display: block; font-size: 9px;
      font-weight: 700; color: var(--text);
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 2px; font-family: var(--sans);
    }
    .mtime .t {
      font-weight: 500; color: var(--text-2);
    }

    .mteam {
      display: flex; align-items: center; gap: 8px;
      min-width: 0; overflow: hidden;
    }
    .mteam.away { flex-direction: row-reverse; }
    .mteam .fl { font-size: 18px; flex-shrink: 0; line-height: 1; }
    .mteam .nm {
      font-size: 12.5px; font-weight: 600;
      letter-spacing: -0.01em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--text);
    }

    .mscore {
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    .sin {
      width: 40px; height: 36px;
      background: var(--bg-input);
      border: 1px solid transparent;
      color: var(--text);
      border-radius: var(--radius-sm);
      text-align: center;
      font-size: 15px; font-weight: 700;
      font-family: var(--mono);
      outline: none;
      transition: all .15s;
      -moz-appearance: textfield;
    }
    .sin::-webkit-inner-spin-button,
    .sin::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .sin::placeholder { color: var(--text-muted); font-weight: 500; }
    .sin:focus {
      background: var(--bg);
      border-color: var(--ink);
      box-shadow: 0 0 0 3px rgba(24,24,27,.08);
    }
    .sin.v {
      background: var(--bg);
      border-color: var(--border-2);
      color: var(--text);
    }
    .ssep {
      font-size: 14px; color: var(--text-muted);
      font-family: var(--mono); font-weight: 400;
    }

    .mstatus {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-2);
      border-radius: var(--radius-sm);
      padding: 7px 26px 7px 10px;
      font-size: 11.5px; font-weight: 500;
      font-family: var(--sans);
      outline: none; cursor: pointer;
      width: 100%;
      transition: all .15s;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%2371717a' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 8px center;
    }
    .mstatus:hover { border-color: var(--border-2); }
    .mstatus:focus {
      border-color: var(--ink);
      box-shadow: 0 0 0 3px rgba(24,24,27,.08);
    }
    .mstatus.fin {
      color: var(--accent); border-color: var(--accent-border);
      background-color: var(--accent-soft); font-weight: 600;
    }
    .mstatus.live {
      color: var(--live); border-color: #fecdd3;
      background-color: #fff1f2; font-weight: 600;
    }

    /* ── EMPTY ── */
    .empty {
      text-align: center; padding: 80px 20px;
      color: var(--text-muted);
    }
    .empty-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: var(--bg-input);
      margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
    }
    .empty b {
      display: block; font-size: 14px; font-weight: 600;
      color: var(--text); margin-bottom: 4px;
    }
    .empty p { font-size: 13px; color: var(--text-soft); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(8px);
      background: var(--ink); color: #fff;
      padding: 10px 18px; border-radius: var(--radius);
      font-size: 13px; font-weight: 500;
      z-index: 9999; opacity: 0; pointer-events: none;
      box-shadow: var(--shadow-lg);
      transition: opacity .2s, transform .2s;
      letter-spacing: -0.005em;
    }
    .toast.show {
      opacity: 1; transform: translateX(-50%) translateY(0);
    }
    .toast.err { background: var(--danger); }

    @media (max-width: 640px) {
      .hdr { padding: 12px 16px; }
      .ctrl { padding: 11px 16px; }
      .sbar { padding: 8px 16px; }
      .mlist { padding: 6px 14px 100px; }
      .mrow {
        grid-template-columns: 56px 1fr auto 1fr 92px;
        gap: 6px; padding: 9px 10px;
      }
      .mteam .nm { font-size: 11px; }
      .sin { width: 32px; height: 32px; font-size: 13px; }
      .mstatus { padding: 6px 22px 6px 8px; font-size: 10.5px; }
    }
  </style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <div class="hdr-logo">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <div class="hdr-text">
      <span class="hdr-title">Admin · Resultados</span>
      <span class="hdr-sub">Contingencia manual</span>
    </div>
  </div>
  <div class="hdr-right" id="hdr-right">WC 2026</div>
</header>

<!-- Auth gate -->
<div id="gate">
  <div class="gate-card">
    <div class="gate-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h2>Acceso restringido</h2>
    <p>Solo el organizador puede ingresar resultados manualmente.</p>
    <label class="gate-label" for="pwd">Contraseña</label>
    <input type="password" id="pwd" class="gate-input" placeholder="••••••••" autocomplete="current-password">
    <button class="btn-primary" id="btn-enter">Entrar</button>
    <div class="gate-err" id="gate-err"></div>
  </div>
</div>

<!-- Main app -->
<div id="app">
  <div class="ctrl">
    <div class="chips" id="chips">
      <button class="chip on" data-f="pending">Sin resultado <span class="ct" id="ct-pending">0</span></button>
      <button class="chip"    data-f="all">Todos <span class="ct" id="ct-all">0</span></button>
      <button class="chip"    data-f="finished">Finalizados <span class="ct" id="ct-finished">0</span></button>
    </div>
    <button class="btn-save" id="btn-save" disabled>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/>
        <polyline points="7 3 7 8 15 8"/>
      </svg>
      Guardar <span class="n-badge" id="n-badge">0</span>
    </button>
  </div>
  <div class="sbar" id="sbar">Cargando datos…</div>
  <div class="mlist" id="mlist"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──
let secret = "";
let filter = "pending";
let matches = [];
let apiResults = {};
let overrides  = {};
let inputs     = {};
let original   = {};

// ── Auth ──
document.getElementById("pwd").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("btn-enter").click();
});

document.getElementById("btn-enter").addEventListener("click", async () => {
  const pwd = document.getElementById("pwd").value.trim();
  if (!pwd) { document.getElementById("gate-err").textContent = "Ingresa la contraseña."; return; }
  secret = pwd;
  document.getElementById("gate").style.display = "none";
  document.getElementById("app").style.display  = "block";
  await loadData();
});

// ── Data loading ──
// Lee desde GitHub Raw (fuente de verdad) con fallback a local de Netlify.
// Netlify no se redeploya en cada commit, pero GitHub Raw siempre tiene lo último.
const GH_RAW = "https://raw.githubusercontent.com/AntonioIQ/wc26-tracker/main/data";

async function loadData() {
  setStatus("Cargando datos…", "busy");
  try {
    const [md, rd, od] = await Promise.all([
      fetchWithFallback("matches.json"),
      fetchWithFallback("results.json"),
      fetchWithFallback("overrides.json"),
    ]);

    matches = md.matches || [];

    apiResults = {};
    (rd.results || []).forEach(r => { apiResults[r.matchId] = r; });

    overrides = {};
    (od.results || []).forEach(r => { overrides[r.matchId] = r; });

    inputs   = {};
    original = {};
    matches.forEach(m => {
      const ov = overrides[m.id];
      const val = {
        home:   ov?.homeScore ?? "",
        away:   ov?.awayScore ?? "",
        status: ov?.status   || "scheduled",
      };
      inputs[m.id]   = { ...val };
      original[m.id] = { ...val };
    });

    updateCounters();
    render();
    setStatus(`${matches.length} partidos · ${countFinished()} con resultado registrado`);
  } catch (e) {
    setStatus("Error al cargar datos: " + e.message, "err");
  }
}

async function fetchJson(url) {
  const r = await fetch(url + (url.includes("?") ? "&" : "?") + "t=" + Date.now());
  if (!r.ok) throw new Error(`HTTP ${r.status} — ${url}`);
  return r.json();
}

async function fetchWithFallback(file) {
  try {
    return await fetchJson(`${GH_RAW}/${file}`);
  } catch {
    return await fetchJson(`./data/${file}`);
  }
}

// ── Constants ──
const FLAGS = {"Mexico":"🇲🇽","South Africa":"🇿🇦","South Korea":"🇰🇷","Czechia":"🇨🇿","Canada":"🇨🇦","Bosnia and Herzegovina":"🇧🇦","Qatar":"🇶🇦","Switzerland":"🇨🇭","United States":"🇺🇸","Paraguay":"🇵🇾","Australia":"🇦🇺","Turkey":"🇹🇷","Brazil":"🇧🇷","Morocco":"🇲🇦","Haiti":"🇭🇹","Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Germany":"🇩🇪","Netherlands":"🇳🇱","Japan":"🇯🇵","Ivory Coast":"🇨🇮","Cote d'Ivoire":"🇨🇮","Ecuador":"🇪🇨","Sweden":"🇸🇪","Tunisia":"🇹🇳","Spain":"🇪🇸","Cape Verde":"🇨🇻","Belgium":"🇧🇪","Egypt":"🇪🇬","Saudi Arabia":"🇸🇦","Uruguay":"🇺🇾","Iran":"🇮🇷","New Zealand":"🇳🇿","France":"🇫🇷","Senegal":"🇸🇳","Iraq":"🇮🇶","Norway":"🇳🇴","Argentina":"🇦🇷","Algeria":"🇩🇿","Austria":"🇦🇹","Jordan":"🇯🇴","Portugal":"🇵🇹","DR Congo":"🇨🇩","England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Croatia":"🇭🇷","Ghana":"🇬🇭","Panama":"🇵🇦","Uzbekistan":"🇺🇿","Colombia":"🇨🇴","Italy":"🇮🇹","Poland":"🇵🇱","Serbia":"🇷🇸","Wales":"🏴󠁧󠁢󠁷󠁬󠁳󠁿","Denmark":"🇩🇰","Curacao":"🇨🇼"};
const SHORT = {"South Africa":"Sudáfrica","South Korea":"Corea","Bosnia and Herzegovina":"Bosnia","United States":"USA","Czechia":"R. Checa","DR Congo":"RD Congo","Cote d'Ivoire":"C. Marfil","Ivory Coast":"C. Marfil","Saudi Arabia":"Arabia S.","Netherlands":"P. Bajos","New Zealand":"N. Zelanda","Cape Verde":"C. Verde","Mexico":"México","Brazil":"Brasil","Spain":"España","Germany":"Alemania","France":"Francia","Belgium":"Bélgica","Switzerland":"Suiza","Croatia":"Croacia","Portugal":"Portugal","Japan":"Japón","Morocco":"Marruecos","Tunisia":"Túnez","Egypt":"Egipto","Argentina":"Argentina","Ecuador":"Ecuador","Colombia":"Colombia","Paraguay":"Paraguay","Uruguay":"Uruguay","Australia":"Australia","Norway":"Noruega","Turkey":"Turquía","Iran":"Irán","Algeria":"Argelia","Austria":"Austria","Canada":"Canadá","Ghana":"Ghana","Panama":"Panamá","England":"Inglaterra","Scotland":"Escocia","Italy":"Italia","Poland":"Polonia","Senegal":"Senegal","Iraq":"Iraq","Jordan":"Jordania","Uzbekistan":"Uzbekistán","Qatar":"Qatar","Haiti":"Haití","Sweden":"Suecia","Denmark":"Dinamarca","Serbia":"Serbia","Wales":"Gales"};

function fl(t) { return FLAGS[t] || "🏳️"; }
function sn(t) { return SHORT[t] || t || "—"; }
function esc(s) { return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function fmtDay(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString("es-MX", { weekday:"long", day:"2-digit", month:"long", timeZone:"America/Mexico_City" });
}
function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString("es-MX", { hour:"2-digit", minute:"2-digit", timeZone:"America/Mexico_City", hour12:false });
}
function dayKey(iso) { return new Date(iso).toLocaleDateString("en-CA", { timeZone:"America/Mexico_City" }); }

function isFinished(m) {
  const api = apiResults[m.id];
  const ov  = overrides[m.id];
  return (api && api.status === "finished") || (ov && ov.status === "finished");
}

function isDirty(id) {
  const c = inputs[id], o = original[id];
  if (!c || !o) return false;
  return c.home !== o.home || c.away !== o.away || c.status !== o.status;
}

function hasBothScores(id) {
  const c = inputs[id];
  return c && c.home !== "" && c.away !== "" && c.home != null && c.away != null;
}

function dirtyCount() { return matches.filter(m => isDirty(m.id)).length; }
function countFinished() { return matches.filter(isFinished).length; }
function countPending()  { return matches.filter(m => !isFinished(m)).length; }

function updateCounters() {
  document.getElementById("ct-pending").textContent  = countPending();
  document.getElementById("ct-all").textContent      = matches.length;
  document.getElementById("ct-finished").textContent = countFinished();
}

function filter_fn(m) {
  if (filter === "pending")  return !isFinished(m);
  if (filter === "finished") return isFinished(m);
  return true;
}

function stageLabel(m) {
  if (m.stage === "group") return `Grupo ${m.group}`;
  const map = {
    "round-of-32":"32avos","round-of-16":"Octavos",
    "quarterfinal":"Cuartos","quarter-final":"Cuartos",
    "semifinal":"Semis","semi-final":"Semis",
    "third-place":"3er Lugar","final":"Final"
  };
  return map[m.stage] || (m.stage ? m.stage : "—");
}

function render() {
  const visible = matches.filter(filter_fn);
  const list = document.getElementById("mlist");

  if (visible.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>
          </svg>
        </div>
        <b>Todo al día</b>
        <p>No hay partidos en este filtro.</p>
      </div>`;
    updateSaveBtn();
    return;
  }

  const grouped = {};
  visible.forEach(m => { const k = dayKey(m.kickoffUtc); (grouped[k] = grouped[k] || []).push(m); });
  const days = Object.keys(grouped).sort();

  list.innerHTML = days.map(dk => {
    const dms = grouped[dk];
    return `
      <div class="day-hdr">
        <span>${fmtDay(dms[0].kickoffUtc)}</span>
        <span class="day-ct">${dms.length} partido${dms.length !== 1 ? "s" : ""}</span>
      </div>
      ${dms.map(rowHTML).join("")}`;
  }).join("");

  list.removeEventListener("input", onInput);
  list.removeEventListener("change", onChange);
  list.addEventListener("input", onInput);
  list.addEventListener("change", onChange);

  updateSaveBtn();
}

function rowHTML(m) {
  const cur = inputs[m.id] || {};
  const dirty = isDirty(m.id);
  const fin = isFinished(m);
  const hasVal = h => h !== "" && h != null;

  const statusOpts = [
    ["scheduled","Programado"],
    ["live","En vivo"],
    ["finished","Finalizado"],
    ["suspended","Suspendido"],
    ["postponed","Aplazado"],
  ].map(([v, l]) => `<option value="${v}" ${cur.status === v ? "selected" : ""}>${l}</option>`).join("");

  const statusCls = cur.status === "finished" ? "fin" : cur.status === "live" ? "live" : "";

  return `
    <div class="mrow ${dirty ? "dirty" : ""} ${fin ? "finished" : ""}" data-id="${esc(m.id)}">
      <div class="mtime">
        <span class="stg">${esc(stageLabel(m))}</span>
        <span class="t">${fmtTime(m.kickoffUtc)}</span>
      </div>
      <div class="mteam">
        <span class="fl">${fl(m.homeTeam)}</span>
        <span class="nm">${esc(sn(m.homeTeam))}</span>
      </div>
      <div class="mscore">
        <input class="sin ${hasVal(cur.home) ? "v" : ""}" type="number" min="0" max="99" inputmode="numeric"
          placeholder="–" value="${hasVal(cur.home) ? cur.home : ""}"
          data-id="${esc(m.id)}" data-side="home" aria-label="Goles local">
        <span class="ssep">–</span>
        <input class="sin ${hasVal(cur.away) ? "v" : ""}" type="number" min="0" max="99" inputmode="numeric"
          placeholder="–" value="${hasVal(cur.away) ? cur.away : ""}"
          data-id="${esc(m.id)}" data-side="away" aria-label="Goles visitante">
      </div>
      <div class="mteam away">
        <span class="fl">${fl(m.awayTeam)}</span>
        <span class="nm">${esc(sn(m.awayTeam))}</span>
      </div>
      <select class="mstatus ${statusCls}" data-id="${esc(m.id)}" aria-label="Estado">
        ${statusOpts}
      </select>
    </div>`;
}

function onInput(e) {
  if (!e.target.classList.contains("sin")) return;
  const id   = e.target.dataset.id;
  const side = e.target.dataset.side;
  const raw  = e.target.value;
  const v    = raw === "" ? "" : Math.max(0, Math.min(99, parseInt(raw, 10) || 0));
  if (!inputs[id]) inputs[id] = {};
  inputs[id][side === "home" ? "home" : "away"] = v;
  e.target.classList.toggle("v", v !== "");
  markRowDirty(id);
  updateSaveBtn();
}

function onChange(e) {
  if (!e.target.classList.contains("mstatus")) return;
  const id = e.target.dataset.id;
  if (!inputs[id]) inputs[id] = {};
  inputs[id].status = e.target.value;
  e.target.className = "mstatus" + (e.target.value === "finished" ? " fin" : e.target.value === "live" ? " live" : "");
  markRowDirty(id);
  updateSaveBtn();
}

function markRowDirty(id) {
  const row = document.querySelector(`.mrow[data-id="${id}"]`);
  if (row) row.classList.toggle("dirty", isDirty(id));
}

function updateSaveBtn() {
  const n = dirtyCount();
  document.getElementById("n-badge").textContent = n;
  document.getElementById("btn-save").disabled = n === 0;
}

// ── Filter chips ──
document.getElementById("chips").addEventListener("click", e => {
  const btn = e.target.closest(".chip");
  if (!btn) return;
  filter = btn.dataset.f;
  document.querySelectorAll(".chip").forEach(c => c.classList.toggle("on", c.dataset.f === filter));
  render();
});

// ── Save ──
document.getElementById("btn-save").addEventListener("click", save);

async function save() {
  const btn = document.getElementById("btn-save");
  btn.disabled = true;
  setStatus("Guardando en el repositorio…", "busy");

  const results = matches
    .filter(m => hasBothScores(m.id))
    .map(m => {
      const c = inputs[m.id];
      return {
        matchId: m.id,
        status: c.status,
        homeScore: parseInt(c.home, 10),
        awayScore: parseInt(c.away, 10),
      };
    });

  try {
    const res = await fetch("/.netlify/functions/save-overrides", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ secret, results }),
    });

    const text = await res.text();
    let data; try { data = JSON.parse(text); } catch { data = { error: text }; }

    if (!res.ok) {
      if (res.status === 401) {
        setStatus("Contraseña incorrecta. Vuelve a entrar.", "err");
        showToast("Contraseña incorrecta", true);
      } else {
        setStatus("Error: " + (data?.error || text), "err");
        showToast("Error al guardar", true);
      }
      btn.disabled = false;
      return;
    }

    matches.forEach(m => { original[m.id] = { ...inputs[m.id] }; });
    results.forEach(r => { overrides[r.matchId] = r; });

    updateCounters();
    const buildMsg = data.buildTriggered
      ? "La tabla se actualiza en ~2 min."
      : "El build se ejecuta en el próximo ciclo.";

    setStatus(`✓ ${data.count} resultado(s) guardado(s). ${buildMsg}`, "ok");
    showToast("Guardado en el repositorio");
    render();
  } catch (e) {
    setStatus("Error de red: " + e.message, "err");
    showToast("Error de red", true);
    btn.disabled = false;
  }
}

// ── Helpers ──
function setStatus(msg, cls = "") {
  const el = document.getElementById("sbar");
  el.textContent = msg;
  el.className = "sbar" + (cls ? " " + cls : "");
}

let toastTimer;
function showToast(msg, isError = false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show" + (isError ? " err" : "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = "toast" + (isError ? " err" : ""); }, 2800);
}
</script>
