<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiniela Mundial 2026</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <!-- AUTH -->
    <div id="auth-screen" class="shell auth-screen">
      <img src="./wc2026-logo.png" alt="FIFA World Cup 2026" class="wc-logo-img" />
      <h1>Quiniela Mundial 2026</h1>
      <p class="auth-subtitle">🇲🇽 🇺🇸 🇨🇦 — Inicia sesión para participar</p>
      <button class="auth-btn" id="btn-login">Entrar</button>
    </div>

    <!-- APP -->
    <main id="app-main" class="shell" style="display:none">
      <header class="hero">
        <img src="./wc2026-logo.png" alt="WC2026" class="wc-logo-img hero-logo-img" />
        <div class="hero-meta">
          <span class="pill user-pill" id="user-display">—</span>
          <button class="auth-btn logout" id="btn-logout">Salir</button>
        </div>
      </header>

      <!-- PODIO TOP 3 -->
      <section class="podium" id="podium"></section>

      <nav class="nav-tabs" role="tablist">
        <button class="nav-tab active tab-highlight" data-tab="tab-picks" role="tab">📝 Mi Quiniela</button>
        <button class="nav-tab" data-tab="tab-leaderboard" role="tab">🏅 Tabla</button>
        <button class="nav-tab" data-tab="tab-groups" role="tab">⚽ Grupos</button>
        <button class="nav-tab" data-tab="tab-calendar" role="tab">� Calendario</button>
        <button class="nav-tab" data-tab="tab-bracket" role="tab">🏆 Eliminatoria</button>
        <button class="nav-tab" data-tab="tab-venues" role="tab">🗺️ Sedes</button>
      </nav>

      <!-- PICKS (now first/default) -->
      <div id="tab-picks" class="tab-panel active">
        <div class="pick-summary" id="pick-summary"></div>
        <div id="pick-editor"></div>
        <div class="form-actions">
          <button class="btn btn-primary" id="btn-save-picks">💾 Guardar picks</button>
          <button class="btn btn-secondary" id="btn-export-picks">📤 Exportar JSON</button>
          <button class="btn btn-danger" id="btn-clear-picks">🗑️ Limpiar</button>
        </div>
        <p class="form-status" id="form-status"></p>
      </div>

      <!-- LEADERBOARD -->
      <div id="tab-leaderboard" class="tab-panel">
        <table class="leaderboard-table">
          <thead><tr><th>#</th><th>Jugador</th><th style="text-align:right">Pts</th></tr></thead>
          <tbody id="leaderboard-body"></tbody>
        </table>
        <p class="form-status" id="leaderboard-updated"></p>
      </div>

      <!-- GROUPS -->
      <div id="tab-groups" class="tab-panel"></div>

      <!-- CALENDAR -->
      <div id="tab-calendar" class="tab-panel">
        <div class="calendar-filters" id="calendar-filters"></div>
        <div id="calendar-list"></div>
      </div>

      <!-- BRACKET -->
      <div id="tab-bracket" class="tab-panel">
        <div class="bracket-container" id="bracket-container"></div>
      </div>

      <!-- VENUES -->
      <div id="tab-venues" class="tab-panel">
        <div id="venues-map" class="venues-map"></div>
        <div id="venues-list" class="venues-grid"></div>
      </div>

      <!-- TOURNAMENT STATS FOOTER -->
      <section class="tournament-footer" id="tournament-footer"></section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
