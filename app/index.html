<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiniela Mundial 2026</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="shell auth-screen">
      <div class="wc-logo">⚽🏆</div>
      <h1>Quiniela Mundial 2026</h1>
      <p class="auth-subtitle">🇲🇽 🇺🇸 🇨🇦 &mdash; Inicia sesión para participar</p>
      <button class="auth-btn" id="btn-login">Entrar</button>
    </div>

    <!-- MAIN APP (hidden until login) -->
    <main id="app-main" class="shell" style="display:none">

      <!-- HERO -->
      <section class="hero">
        <div class="hero-logo">⚽🏆</div>
        <h1 id="tournament-name">Quiniela Mundial 2026</h1>
        <div class="hero-meta">
          <span class="pill" id="tournament-timezone">UTC</span>
          <span class="pill user-pill" id="user-display">—</span>
          <button class="auth-btn logout" id="btn-logout">Salir</button>
        </div>
      </section>

      <!-- STATS -->
      <section class="stats-grid">
        <article class="stat-card">
          <p class="stat-value" id="stat-matches">0</p>
          <p class="stat-label">Partidos</p>
        </article>
        <article class="stat-card">
          <p class="stat-value" id="stat-locked">0</p>
          <p class="stat-label">Cerrados</p>
        </article>
        <article class="stat-card">
          <p class="stat-value" id="stat-players">0</p>
          <p class="stat-label">Participantes</p>
        </article>
        <article class="stat-card">
          <p class="stat-value" id="stat-finished">0</p>
          <p class="stat-label">Jugados</p>
        </article>
      </section>

      <!-- TABS -->
      <nav class="nav-tabs" role="tablist">
        <button class="nav-tab active" data-tab="tab-matches" role="tab">🏟️ Partidos</button>
        <button class="nav-tab" data-tab="tab-picks" role="tab">📝 Mi Quiniela</button>
        <button class="nav-tab" data-tab="tab-leaderboard" role="tab">🏅 Tabla</button>
      </nav>

      <!-- TAB: PARTIDOS -->
      <div id="tab-matches" class="tab-panel active">
        <div id="matches-container"></div>
      </div>

      <!-- TAB: MI QUINIELA -->
      <div id="tab-picks" class="tab-panel">
        <div class="pick-summary" id="pick-summary">
          <strong>0</strong> de <strong>0</strong> picks capturados
        </div>
        <div id="pick-editor"></div>
        <div class="form-actions">
          <button class="btn btn-primary" id="btn-save-picks">💾 Guardar picks</button>
          <button class="btn btn-secondary" id="btn-export-picks">📤 Exportar JSON</button>
          <button class="btn btn-danger" id="btn-clear-picks">🗑️ Limpiar</button>
        </div>
        <p class="form-status" id="form-status"></p>
      </div>

      <!-- TAB: LEADERBOARD -->
      <div id="tab-leaderboard" class="tab-panel">
        <table class="leaderboard-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Jugador</th>
              <th style="text-align:right">Puntos</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body"></tbody>
        </table>
        <p class="form-status" id="leaderboard-updated"></p>
      </div>

    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
