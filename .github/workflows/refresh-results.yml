name: Refresh Results

on:
  schedule:
    # 2 veces al día: 07:00 y 22:00 UTC = 1am y 4pm hora México
    - cron: "0 7,22 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Ingest results from API
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/ingest-results.js

      - name: Recalculate and build
        run: npm run build

      - name: Commit changes if any
        run: |
          git config user.name "J Antonio Tapia"
          git config user.email "j.anton.tg@gmail.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Sin cambios"
          else
            git commit -m "auto: actualizar resultados"
            git push
          fi
