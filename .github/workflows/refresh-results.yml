name: Refresh Results

on:
  schedule:
    # 2 veces al día: 07:00 y 22:00 UTC = 1am y 4pm hora México
    - cron: "0 7,22 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Solo 1 workflow corriendo a la vez. Si dispatch nuevo llega mientras
# está corriendo (ej. admin guarda 2 veces o cron coincide con save), se
# encola y espera. Previene race conditions al pushear leaderboard.json.
concurrency:
  group: refresh-results
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Ingest results from API
        continue-on-error: true
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/ingest-results.js

      - name: Recalculate and build
        run: npm run build

      - name: Commit changes if any
        run: |
          git config user.name "J Antonio Tapia"
          git config user.email "j.anton.tg@gmail.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Sin cambios"
            exit 0
          fi
          git commit -m "auto: actualizar resultados"

          # Retry con rebase para manejar race conditions entre workflows
          # (admin guarda 2 veces rápido o cron + admin al mismo tiempo)
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push OK en intento $attempt"
              exit 0
            fi
            echo "Push falló (intento $attempt) — rebasing..."
            git pull --rebase origin main
          done
          echo "Push falló después de 5 intentos"
          exit 1
