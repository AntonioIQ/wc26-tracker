name: Refresh Results

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Attempt ingest
        run: node scripts/ingest-results.js

      - name: Rebuild static artifacts
        run: npm run build

      - name: No-op note
        run: echo "Agregar commit automatizado solo cuando la fuente externa este definida y sea segura."
