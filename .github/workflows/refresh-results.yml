name: Refresh Results

on:
  schedule:
    # Cada 15 min durante dias de partido (jun 11 - jul 19)
    # Fuera de temporada se puede desactivar
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ingest results from API
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/ingest-results.js

      - name: Recalculate leaderboard
        run: npm run build

      - name: Commit changes if any
        run: |
          git config user.name "J Antonio Tapia"
          git config user.email "j.anton.tg@gmail.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Sin cambios"
          else
            git commit -m "auto: actualizar resultados"
            git push
          fi
