name: Recalculate on Push

on:
  push:
    branches: [main]
    paths:
      - 'data/picks/**'
      - 'data/results.json'
      - 'data/overrides.json'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  recalculate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate and recalculate
        run: npm run validate && npm run score

      - name: Commit leaderboard if changed
        run: |
          git config user.name "J Antonio Tapia"
          git config user.email "j.anton.tg@gmail.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Sin cambios"
          else
            git commit -m "auto: recalcular tabla"
            git push
          fi
